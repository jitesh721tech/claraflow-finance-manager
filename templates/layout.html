{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>
        {% block title %}
        Finance Manager
        {% endblock %}
    </title>
</head>
<body class="text-center">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="/">ClaraFlow</a>

        <div class="ms-auto">
            {% if user.is_authenticated %}
                <div class="dropdown">
                    <button class="btn btn-outline-light menu-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        ☰
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/dashboard/">Dashboard</a></li>
                        <li><a class="dropdown-item" href="/add-income/">Add Income</a></li>
                        <li><a class="dropdown-item" href="/add-expense/">Add Expense</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="/logout/">Logout</a></li>
                    </ul>
                </div>
            {% else %}
                <a href="/login/" class="btn btn-outline-light me-2">Login</a>
                <a href="/register/" class="btn btn-info">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

  <!-- CONTENT -->
  <div class="container">
    {% block content %}
    {% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
