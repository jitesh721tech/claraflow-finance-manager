{% extends "layout.html" %}

{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-4">

    <h3>Add Expense</h3>

    <form method="POST" class="card p-4">
      {% csrf_token %}
      {% for field in form %}
  <div class="mb-3">
    {{ field.label_tag }}
    {{ field }}
    {% if field.errors %}
      <div class="text-danger">{{ field.errors }}</div>
    {% endif %}
  </div>
{% endfor %}
      <button type="submit" class="btn btn-danger w-100">Save</button>
    </form>

  </div>
</div>

{% endblock %}
