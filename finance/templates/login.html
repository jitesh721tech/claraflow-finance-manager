{% extends "layout.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-4">

    <h2 class="text-center mb-4">Login</h2>

    <form method="POST" class="card p-4 shadow">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

  </div>
</div>

{% endblock %}
